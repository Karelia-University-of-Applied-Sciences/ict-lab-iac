---
- name: Set up Root CA server
  hosts: task3_ca
  become: true

  vars_files:
    - vars/ca.yml

  tasks:
    - name: Install python3-cryptography package
      ansible.builtin.apt:
        name: python3-cryptography
        state: present
        update_cache: true

    - name: Create CA directory
      ansible.builtin.file:
        path: '{{ ca_dir }}'
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Generate CA private key
      community.crypto.openssl_privatekey:
        path: '{{ ca_key }}'
        size: 4096
        mode: '0600'

    - name: Generate CA certificate signing request
      community.crypto.openssl_csr:
        path: '{{ ca_csr }}'
        privatekey_path: '{{ ca_key }}'
        common_name: 'Task3 Root CA'
        # Mark this as a CA certificate capable of signing other certs
        basic_constraints:
          - 'CA:TRUE'
        basic_constraints_critical: true
        key_usage:
          - keyCertSign
          - cRLSign
        key_usage_critical: true

    - name: Generate self-signed CA certificate
      community.crypto.x509_certificate:
        path: '{{ ca_cert }}'
        csr_path: '{{ ca_csr }}'
        privatekey_path: '{{ ca_key }}'
        provider: selfsigned
        selfsigned_not_after: '+3650d'

    # Fetch to controller so web.yml and lb.yml can distribute it
    - name: Fetch CA certificate to controller
      ansible.builtin.fetch:
        src: '{{ ca_cert }}'
        dest: '{{ controller_ca_cert }}'
        flat: true
