---
- name: Configure nginx load balancer with HTTPS and round-robin proxy
  hosts: task3_lb
  become: true

  vars:
    ca_host: '{{ groups[''task3_ca''][0] }}'
    # Temp paths on the CA host (staging for signing)
    ca_signed_cert: '/tmp/signed_{{ inventory_hostname }}.crt'
    ca_staged_csr: '/tmp/sign_{{ inventory_hostname }}.csr'
    # CA cert fetched to controller by ca.yml
    controller_ca_cert: /tmp/task3_ca.crt
    # Temp paths on the controller
    controller_cert: '{{ controller_tmp_dir }}/{{ inventory_hostname }}.crt'
    controller_csr: '{{ controller_tmp_dir }}/{{ inventory_hostname }}.csr'
    controller_tmp_dir: /tmp/task3
    # Temp CSR path on this host
    host_csr: '/tmp/{{ inventory_hostname }}.csr'
    # Paths in the nginx SSL directory on this host
    ssl_ca_cert: '{{ ssl_dir }}/ca.crt'
    ssl_cert: '{{ ssl_dir }}/server.crt'
    ssl_dir: /etc/nginx/ssl
    ssl_key: '{{ ssl_dir }}/server.key'

  tasks:
    - name: Install nginx and python3-cryptography
      ansible.builtin.apt:
        name:
          - nginx
          - python3-cryptography
        state: present
        update_cache: true

    - name: Create nginx SSL directory
      ansible.builtin.file:
        path: '{{ ssl_dir }}'
        state: directory
        owner: root
        group: root
        mode: '0750'

    - name: Generate LB private key
      community.crypto.openssl_privatekey:
        path: '{{ ssl_key }}'
        size: 2048
        mode: '0600'

    - name: Generate CSR for load balancer
      community.crypto.openssl_csr:
        path: '{{ host_csr }}'
        privatekey_path: '{{ ssl_key }}'
        common_name: '{{ inventory_hostname }}'
        subject_alt_name:
          - 'IP:{{ ansible_host }}'

    # file module with state: directory is idempotent — safe to run per host
    - name: Ensure local temp directory exists
      ansible.builtin.file:
        path: '{{ controller_tmp_dir }}'
        state: directory
        mode: '0700'
      delegate_to: localhost

    - name: Fetch CSR to controller
      ansible.builtin.fetch:
        src: '{{ host_csr }}'
        dest: '{{ controller_csr }}'
        flat: true

    - name: Copy CSR to CA for signing
      ansible.builtin.copy:
        src: '{{ controller_csr }}'
        dest: '{{ ca_staged_csr }}'
        mode: '0644'
      become: true
      delegate_to: '{{ ca_host }}'

    - name: Sign CSR on CA with ownca provider
      community.crypto.x509_certificate:
        path: '{{ ca_signed_cert }}'
        csr_path: '{{ ca_staged_csr }}'
        provider: ownca
        ownca_path: /etc/pki/ca/ca.crt
        ownca_privatekey_path: /etc/pki/ca/ca.key
        ownca_not_after: '+365d'
      become: true
      delegate_to: '{{ ca_host }}'

    - name: Fetch signed certificate from CA to controller
      ansible.builtin.fetch:
        src: '{{ ca_signed_cert }}'
        dest: '{{ controller_cert }}'
        flat: true
      become: true
      delegate_to: '{{ ca_host }}'

    - name: Copy signed certificate to load balancer
      ansible.builtin.copy:
        src: '{{ controller_cert }}'
        dest: '{{ ssl_cert }}'
        mode: '0644'

    - name: Copy CA certificate to load balancer
      ansible.builtin.copy:
        src: '{{ controller_ca_cert }}'
        dest: '{{ ssl_ca_cert }}'
        mode: '0644'

    - name: Deploy nginx load balancer configuration
      ansible.builtin.template:
        src: templates/nginx-lb.conf.j2
        dest: /etc/nginx/sites-available/task3-lb.conf
        owner: root
        group: root
        mode: '0644'
      notify: Reload nginx

    - name: Enable task3-lb nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/task3-lb.conf
        dest: /etc/nginx/sites-enabled/task3-lb.conf
        state: link
      notify: Reload nginx

    - name: Disable nginx default site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    - name: Enable and start nginx
      ansible.builtin.service:
        enabled: true
        name: nginx
        state: started

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
