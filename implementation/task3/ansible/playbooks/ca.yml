---
- name: Set up Root CA server
  hosts: task3_ca
  become: true

  vars_files:
    - ../vars/ca.yml

  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        name:
          - nginx
          - python3-cryptography
        state: present
        update_cache: true

    - name: Create CA directory
      ansible.builtin.file:
        path: '{{ ca_dir }}'
        state: directory
        owner: root
        group: root
        # 0711: root can list; others can traverse (needed for nginx to follow symlink)
        mode: '0711'

    - name: Generate CA private key
      community.crypto.openssl_privatekey:
        path: '{{ ca_key }}'
        size: 4096
        mode: '0600'

    - name: Generate CA certificate signing request
      community.crypto.openssl_csr:
        path: '{{ ca_csr }}'
        privatekey_path: '{{ ca_key }}'
        common_name: 'Task3 Root CA'
        # Mark this as a CA certificate capable of signing other certs
        basic_constraints:
          - 'CA:TRUE'
        basic_constraints_critical: true
        key_usage:
          - keyCertSign
          - cRLSign
        key_usage_critical: true

    - name: Generate self-signed CA certificate
      community.crypto.x509_certificate:
        path: '{{ ca_cert }}'
        csr_path: '{{ ca_csr }}'
        privatekey_path: '{{ ca_key }}'
        provider: selfsigned
        selfsigned_not_after: '+3650d'
        # CA cert is public; must be world-readable so nginx can serve it
        mode: '0644'

    # Fetch to controller so web.yml and lb.yml can distribute it
    - name: Fetch CA certificate to controller
      ansible.builtin.fetch:
        src: '{{ ca_cert }}'
        dest: '{{ controller_ca_cert }}'
        flat: true

    # Serve ca.crt over plain HTTP so clients can download and trust it
    - name: Symlink CA certificate into nginx webroot
      ansible.builtin.file:
        src: '{{ ca_cert }}'
        dest: /var/www/html/ca.crt
        state: link

    - name: Ensure nginx is started and enabled
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true
