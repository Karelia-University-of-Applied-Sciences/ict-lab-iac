---
- name: Configure nginx load balancer with HTTPS and round-robin proxy
  hosts: task3_lb
  become: true

  vars_files:
    - ../vars/pki.yml

  tasks:
    - name: Install nginx and python3-cryptography
      ansible.builtin.apt:
        name:
          - nginx
          - python3-cryptography
        state: present
        update_cache: true

    - name: Create nginx SSL directory
      ansible.builtin.file:
        path: '{{ ssl_dir }}'
        state: directory
        owner: root
        group: root
        mode: '0750'

    - name: Generate LB private key
      community.crypto.openssl_privatekey:
        path: '{{ ssl_key }}'
        size: 2048
        mode: '0600'

    - name: Generate CSR for load balancer
      community.crypto.openssl_csr:
        path: '{{ host_csr }}'
        privatekey_path: '{{ ssl_key }}'
        common_name: '{{ inventory_hostname }}'
        # IP SAN: clients connect to LB by IP
        # DNS SAN: retained for hostname-based access
        subject_alt_name:
          - 'DNS:{{ inventory_hostname }}'
          - 'IP:{{ ansible_host }}'

    # file module with state: directory is idempotent — safe to run per host
    - name: Ensure local temp directory exists
      ansible.builtin.file:
        path: '{{ controller_tmp_dir }}'
        state: directory
        mode: '0700'
      become: false
      delegate_to: localhost

    - name: Fetch CSR to controller
      ansible.builtin.fetch:
        src: '{{ host_csr }}'
        dest: '{{ controller_csr }}'
        flat: true

    - name: Copy CSR to CA for signing
      ansible.builtin.copy:
        src: '{{ controller_csr }}'
        dest: '{{ ca_staged_csr }}'
        mode: '0644'
      become: true
      delegate_to: '{{ ca_host }}'

    - name: Sign CSR on CA with ownca provider
      community.crypto.x509_certificate:
        path: '{{ ca_signed_cert }}'
        csr_path: '{{ ca_staged_csr }}'
        provider: ownca
        ownca_path: /etc/pki/ca/ca.crt
        ownca_privatekey_path: /etc/pki/ca/ca.key
        ownca_not_after: '+365d'
      become: true
      delegate_to: '{{ ca_host }}'

    - name: Fetch signed certificate from CA to controller
      ansible.builtin.fetch:
        src: '{{ ca_signed_cert }}'
        dest: '{{ controller_cert }}'
        flat: true
      become: true
      delegate_to: '{{ ca_host }}'

    - name: Copy signed certificate to load balancer
      ansible.builtin.copy:
        src: '{{ controller_cert }}'
        dest: '{{ ssl_cert }}'
        mode: '0644'

    - name: Copy CA certificate to load balancer
      ansible.builtin.copy:
        src: '{{ controller_ca_cert }}'
        dest: '{{ ssl_ca_cert }}'
        mode: '0644'

    # Add web server hostnames to /etc/hosts so nginx can resolve them for upstream
    - name: Add web server hostnames to /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: '{{ hostvars[item]["ansible_host"] }} {{ item }}'
        state: present
      loop: '{{ groups["task3_web"] }}'

    - name: Deploy nginx load balancer configuration
      ansible.builtin.template:
        src: nginx-lb.conf.j2
        dest: /etc/nginx/sites-available/task3-lb.conf
        owner: root
        group: root
        mode: '0644'
      notify: Reload nginx

    - name: Enable task3-lb nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/task3-lb.conf
        dest: /etc/nginx/sites-enabled/task3-lb.conf
        state: link
      notify: Reload nginx

    - name: Disable nginx default site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    - name: Enable and start nginx
      ansible.builtin.service:
        enabled: true
        name: nginx
        state: started

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
