---
- name: Configure web servers with HTTPS and unique pages
  hosts: task3_web
  become: true

  vars:
    ca_host: '{{ groups[''task3_ca''][0] }}'
    ssl_dir: /etc/nginx/ssl

  tasks:
    - name: Install nginx and python3-cryptography
      ansible.builtin.apt:
        name:
          - nginx
          - python3-cryptography
        state: present
        update_cache: true

    - name: Create nginx SSL directory
      ansible.builtin.file:
        path: '{{ ssl_dir }}'
        state: directory
        owner: root
        group: root
        mode: '0750'

    - name: Generate server private key
      community.crypto.openssl_privatekey:
        path: '{{ ssl_dir }}/server.key'
        size: 2048
        mode: '0600'

    - name: Generate CSR for web server
      community.crypto.openssl_csr:
        path: /tmp/{{ inventory_hostname }}.csr
        privatekey_path: '{{ ssl_dir }}/server.key'
        common_name: '{{ inventory_hostname }}'
        # IP SAN allows the LB to verify the cert when connecting by IP
        subject_alt_name:
          - 'IP:{{ ansible_host }}'

    - name: Ensure local temp directory exists
      ansible.builtin.file:
        path: /tmp/task3
        state: directory
        mode: '0700'
      delegate_to: localhost
      run_once: true

    - name: Fetch CSR to controller
      ansible.builtin.fetch:
        src: /tmp/{{ inventory_hostname }}.csr
        dest: /tmp/task3/{{ inventory_hostname }}.csr
        flat: true

    - name: Copy CSR to CA for signing
      ansible.builtin.copy:
        src: /tmp/task3/{{ inventory_hostname }}.csr
        dest: /tmp/sign_{{ inventory_hostname }}.csr
        mode: '0644'
      become: true
      delegate_to: '{{ ca_host }}'

    - name: Sign CSR on CA with ownca provider
      community.crypto.x509_certificate:
        path: /tmp/signed_{{ inventory_hostname }}.crt
        csr_path: /tmp/sign_{{ inventory_hostname }}.csr
        provider: ownca
        ownca_path: /etc/pki/ca/ca.crt
        ownca_privatekey_path: /etc/pki/ca/ca.key
        ownca_not_after: '+365d'
      become: true
      delegate_to: '{{ ca_host }}'

    - name: Fetch signed certificate from CA to controller
      ansible.builtin.fetch:
        src: /tmp/signed_{{ inventory_hostname }}.crt
        dest: /tmp/task3/{{ inventory_hostname }}.crt
        flat: true
      become: true
      delegate_to: '{{ ca_host }}'

    - name: Copy signed certificate to web server
      ansible.builtin.copy:
        src: /tmp/task3/{{ inventory_hostname }}.crt
        dest: '{{ ssl_dir }}/server.crt'
        mode: '0644'

    - name: Copy CA certificate to web server
      ansible.builtin.copy:
        src: /tmp/task3_ca.crt
        dest: '{{ ssl_dir }}/ca.crt'
        mode: '0644'

    - name: Deploy nginx HTTPS configuration
      ansible.builtin.template:
        src: templates/nginx-web.conf.j2
        dest: /etc/nginx/sites-available/task3.conf
        owner: root
        group: root
        mode: '0644'
      notify: Reload nginx

    - name: Enable task3 nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/task3.conf
        dest: /etc/nginx/sites-enabled/task3.conf
        state: link
      notify: Reload nginx

    - name: Disable nginx default site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    # server_name is set by Terraform as an ansible_host variable
    - name: Deploy unique index.html
      ansible.builtin.copy:
        content: |
          <!DOCTYPE html>
          <html>
          <head><title>{{ server_name }}</title></head>
          <body><h1>Hello from {{ server_name }}!</h1></body>
          </html>
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: '0644'

    - name: Enable and start nginx
      ansible.builtin.service:
        enabled: true
        name: nginx
        state: started

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
