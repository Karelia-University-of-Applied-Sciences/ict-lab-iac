---
# Certificate renewal play for web servers and load balancer.
#
# Normal run — renews certs expiring within 30 days:
#   ansible-playbook renew.yml
#
# Force renewal regardless of expiry (e.g. after CA rotation):
#   ansible-playbook renew.yml -e force_renew=true

- name: Renew expiring certificates
  hosts: task3_web:task3_lb
  become: true

  vars_files:
    - ../vars/pki.yml

  tasks:
    - name: Check certificate expiry
      community.crypto.x509_certificate_info:
        path: '{{ ssl_cert }}'
        valid_at:
          thirty_days: '+30d'
      register: cert_info
      # Certificate may not exist on a fresh host
      ignore_errors: true

    - name: Mark certificate for renewal
      ansible.builtin.set_fact:
        needs_renewal: >-
          {{ force_renew | default(false) | bool
             or cert_info is failed
             or not cert_info.valid_at.thirty_days }}

    # Remove CA-staged cert so x509_certificate re-signs rather than skips
    - name: Remove CA-staged signed certificate
      ansible.builtin.file:
        path: '{{ ca_signed_cert }}'
        state: absent
      delegate_to: '{{ ca_host }}'
      when: needs_renewal

    - name: Ensure local temp directory exists
      ansible.builtin.file:
        path: '{{ controller_tmp_dir }}'
        state: directory
        mode: '0700'
      become: false
      delegate_to: localhost
      when: needs_renewal

    - name: Fetch CSR to controller
      ansible.builtin.fetch:
        src: '{{ host_csr }}'
        dest: '{{ controller_csr }}'
        flat: true
      when: needs_renewal

    - name: Copy CSR to CA for signing
      ansible.builtin.copy:
        src: '{{ controller_csr }}'
        dest: '{{ ca_staged_csr }}'
        mode: '0644'
      become: true
      delegate_to: '{{ ca_host }}'
      when: needs_renewal

    - name: Sign CSR on CA with ownca provider
      community.crypto.x509_certificate:
        path: '{{ ca_signed_cert }}'
        csr_path: '{{ ca_staged_csr }}'
        provider: ownca
        ownca_path: /etc/pki/ca/ca.crt
        ownca_privatekey_path: /etc/pki/ca/ca.key
        ownca_not_after: '+365d'
      become: true
      delegate_to: '{{ ca_host }}'
      when: needs_renewal

    - name: Fetch signed certificate from CA to controller
      ansible.builtin.fetch:
        src: '{{ ca_signed_cert }}'
        dest: '{{ controller_cert }}'
        flat: true
      become: true
      delegate_to: '{{ ca_host }}'
      when: needs_renewal

    - name: Deploy renewed certificate
      ansible.builtin.copy:
        src: '{{ controller_cert }}'
        dest: '{{ ssl_cert }}'
        mode: '0644'
      notify: Reload nginx
      when: needs_renewal

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
